<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$CWAT | The Laboratory</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&f[]=cabinet-grotesk@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pfp.css">
</head>
<body class="custom-cursor-active">

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <header class="site-header scrolled">
        <div class="header-inner">
            <div class="brand"><a href="index.html">$CWAT</a></div>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="tokenomics.html" class="magnetic-link" data-cursor="-pointer">Tokenomics</a></li>
                    <li><a href="roadmap.html" class="magnetic-link" data-cursor="-pointer">Journey</a></li>
                    <li><a href="whitepaper.html" class="magnetic-link" data-cursor="-pointer">Grimoire</a></li>

                    <li><a href="pfp.html" class="active">Laboratory</a></li>
                    
                </ul>
            </nav>
        </div>
    </header>

    <main class="pfp-main container">
        <div class="pfp-header text-center">
            <h1 class="massive-title" style="font-size: 4rem;">THE <span class="anomaly-glow">LABORATORY</span></h1>
            <p>Build your anomaly. Drag, scale, and rotate layers natively.</p>
        </div>

        <div class="pfp-workspace mt-5">
            <div class="canvas-container-glass glass-card">
                <canvas id="meme-canvas"></canvas>
            </div>

            <div class="tools-panel glass-card">
                
                <div class="tool-section">
                    <h3 class="ca-label">1. Environment (Background)</h3>
                    <div class="btn-group">
                        <button class="action-btn" onclick="setBackgroundColor('#0c1410')">Dark Forest</button>
                        <button class="action-btn" onclick="setBackgroundColor('#8be9fd')">Spirit Blue</button>
                        <label class="action-btn upload-btn">
                            Upload Custom BG
                            <input type="file" id="upload-bg" hidden accept="image/*">
                        </label>
                    </div>
                </div>

                <div class="tool-section mt-4">
                    <h3 class="ca-label">2. The Subject</h3>
                    <div class="btn-group">
                        <button class="action-btn premium-glow" onclick="addAsset('assets/cwat-head.png')">Spawn $CWAT</button>
                        <label class="action-btn upload-btn">
                            Upload Your Photo
                            <input type="file" id="upload-base" hidden accept="image/*">
                        </label>
                    </div>
                </div>

                <div class="tool-section mt-4">
                    <h3 class="ca-label">3. Anomalies & Props</h3>
                    
                    <div class="asset-grid">
                        <img src="assets/left_ear.png" class="asset-thumbnail" onclick="addAsset('assets/left_ear.png')" alt="Left Ear" onerror="this.style.display='none'">
                        <img src="assets/right_ear.png" class="asset-thumbnail" onclick="addAsset('assets/right_ear.png')" alt="Right Ear" onerror="this.style.display='none'">
                        <img src="assets/left_eye.png" class="asset-thumbnail" onclick="addAsset('assets/left_eye.png')" alt="Left Eye" onerror="this.style.display='none'">
                        <img src="assets/right_eye.png" class="asset-thumbnail" onclick="addAsset('assets/right_eye.png')" alt="Right Eye" onerror="this.style.display='none'">
                        <img src="assets/mouth.png" class="asset-thumbnail" onclick="addAsset('assets/mouth.png')" alt="Mouth" onerror="this.style.display='none'">
                    </div>
                    
                    <div class="mt-3">
                        <label for="upload-prop" class="action-btn upload-btn" style="display: block; width: 100%; text-align: center; margin-top: 15px;">
                            Upload Custom Prop
                        </label>
                        <input type="file" id="upload-prop" style="display: none;" accept="image/*">
                    </div>
                </div>

                <div class="tool-section mt-4 border-top pt-3">
                    <h3 class="ca-label">Layer Controls</h3>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Select an item on the canvas first.</p>
                    <div class="btn-group mt-2">
                        <button class="action-btn danger-btn" id="delete-btn">Delete Selected</button>
                        <button class="action-btn" id="bring-front-btn">Bring Forward</button>
                    </div>
                </div>

                <button id="download-btn" class="btn-premium w-100 mt-5">
                    <span class="btn-text">Download Masterpiece</span>
                    <span class="btn-hover-fill"></span>
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="js/pfp-logic.js"></script>
</body>
</html>
